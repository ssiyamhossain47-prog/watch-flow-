<script>

/* DATA */

let time = 5;
let timerRun = null;
let rewarded = false;

let pending = 0;
let withdrawBalance = 0;
let adsWatched = 0;

let currentAdLink = "";
let currentReward = 0;
let currentTime = 5;

/* LOAD USER DATA */

function loadData(){

document.getElementById("pendingMoney").innerText =
pending + " TK";

document.getElementById("withdrawMoney").innerText =
withdrawBalance + " TK";

document.getElementById("adsWatched").innerText =
adsWatched;

}

/* REGISTER */

function register(){

let email =
document.getElementById("email").value;

let pass =
document.getElementById("pass").value;

auth.createUserWithEmailAndPassword(email,pass)

.then((user)=>{

db.ref("users/"+user.user.uid).set({

email:email,
pending:0,
withdrawBalance:0,
adsWatched:0

});

user.user.sendEmailVerification();

alert("Registration Success");

})

.catch((error)=>{

alert(error.message);

});

}

/* LOGIN */

function login(){

let email =
document.getElementById("email").value;

let pass =
document.getElementById("pass").value;

auth.signInWithEmailAndPassword(email,pass)

.catch((error)=>{

alert(error.message);

});

}

/* LOGOUT */

function logout(){

auth.signOut();

}

/* AUTH */

auth.onAuthStateChanged((user)=>{

if(user){

document.getElementById("authPage").style.display =
"none";

document.getElementById("app").style.display =
"block";

document.getElementById("userEmail").innerText =
user.email;

document.getElementById("userName").innerText =
user.email.split("@")[0];

db.ref("users/"+user.uid).on("value",(snap)=>{

let data = snap.val();

if(data){

pending = data.pending || 0;

withdrawBalance =
data.withdrawBalance || 0;

adsWatched =
data.adsWatched || 0;

loadData();

}

});

}else{

document.getElementById("authPage").style.display =
"block";

document.getElementById("app").style.display =
"none";

}

});

/* HOME */

function goHome(){

document.getElementById("home").style.display =
"block";

document.getElementById("ads").style.display =
"none";

document.getElementById("watch").style.display =
"none";

document.getElementById("withdraw").style.display =
"none";

clearInterval(timerRun);

}

/* SHOW ADS */

function showAds(){

document.getElementById("home").style.display =
"none";

document.getElementById("ads").style.display =
"block";

let box =
document.getElementById("adList");

box.innerHTML = "";

/* FIREBASE ADS */

db.ref("ads").once("value").then((snap)=>{

let data = snap.val();

if(data){

for(let id in data){

let ad = data[id];

let d = document.createElement("div");

d.className = "adBox";

d.innerHTML = `
🎥 ${ad.title}<br><br>
💰 Earn ${ad.reward} TK<br>
⏰ ${ad.time} Sec
`;

d.onclick = function(){

openWatch(
ad.link,
ad.reward,
ad.time
);

};

box.appendChild(d);

}

}else{

box.innerHTML = `
<div class="notice">
No Ads Available
</div>
`;

}

});

}

/* OPEN WATCH */

function openWatch(link,reward,seconds){

currentAdLink = link;

currentReward = reward;

currentTime = seconds;

document.getElementById("ads").style.display =
"none";

document.getElementById("watch").style.display =
"block";

document.getElementById("watchNotice").innerText =
seconds + " Second Complete করতে হবে";

time = currentTime;

rewarded = false;

document.getElementById("timer").innerText =
time;

clearInterval(timerRun);

timerRun = setInterval(()=>{

time--;

document.getElementById("timer").innerText =
time;

if(time <= 0){

rewarded = true;

clearInterval(timerRun);

}

},1000);

}

/* OPEN REAL AD */

function openRealAd(){

window.open(
currentAdLink,
"_blank"
);

}

/* FINISH */

function finish(){

window.open(
currentAdLink,
"_blank"
);

pending += currentReward;

adsWatched++;

db.ref("users/"+auth.currentUser.uid).update({

pending: pending,
adsWatched: adsWatched

});

alert(currentReward + " TK Added");

goHome();

}
/* OPEN WITHDRAW */

function openWithdraw(){

document.getElementById("home").style.display =
"none";

document.getElementById("ads").style.display =
"none";

document.getElementById("watch").style.display =
"none";

document.getElementById("withdraw").style.display =
"block";

}
/* SUBMIT WITHDRAW */

function submitWithdraw(){

let name =
document.getElementById("wname").value;

let amount =
parseInt(
document.getElementById("wamount").value
);

let method =
document.getElementById("wmethod").value;

let number =
document.getElementById("wnumber").value;

if(!name || !amount || !method || !number){

alert("সব তথ্য পূরণ করো");

return;

}

if(amount < 100){

alert("100 টাকার নিচে Withdraw হবে না");

return;

}

if(amount > withdrawBalance){

alert("তোমার কাছে এত টাকা নাই");

return;

}

withdrawBalance -= amount;

db.ref("users/"+auth.currentUser.uid).update({

withdrawBalance:withdrawBalance

});

db.ref("withdrawRequests").push({

name:name,
amount:amount,
method:method,
number:number,
email:auth.currentUser.email,
uid:auth.currentUser.uid,
time:new Date().toString()

});

alert("Withdraw Request Sent");

goHome();

}

</script>
